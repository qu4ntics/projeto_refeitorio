<form method="post" action="{% url 'accounts:logout' %}" class="logout-form{% if variant == 'button' %} logout-form--button config-perfil-logout{% else %} logout-form--icon topbar-logout{% endif %}">
  {% csrf_token %}
  {% if variant == 'button' %}
  <button type="submit" class="config-btn config-btn--ghost config-btn--logout" data-loading-text="Saindo...">
    <i class="fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
    Sair
  </button>
  {% else %}
  <button type="submit" class="logout-form__icon-btn" aria-label="Sair" data-loading-text="Saindo...">
    <i class="fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
  </button>
  {% endif %}
</form>
