<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="caixa-login">
        <div class="barra-topo">
        <a href="login.html">&larr;</a>
        <p>Criar conta</p>
        </div>

        <form>
            <input type="text" placeholder="Nome completo" required>
            <select name="turma" required>
                <option value="" disabled selected hidden>Turma</option>
                <option value="1">1º ano Administração</option>
                <option value="2">2º ano Administração</option>
                <option value="3">3º ano Administração</option>
                <option value="4">1º ano Agropecuária</option>
                <option value="5">2º ano Agropecuária</option>
                <option value="6">3º ano Agropecuária</option>
                <option value="7">1º ano Informática</option>
                <option value="8">2º ano Informática</option>
                <option value="9">3º ano Informática</option>
                <option value="10">1º ano Mineração</option>
                <option value="11">2º ano Mineração</option>
                <option value="12">3º ano Mineração</option>
            </select>
            <input type="email" placeholder="E-mail" required>
            <div class="grupo-senha">
                <div class="caixa-senha">
                    <input type="password" placeholder="Senha" id="senha" required>
                    <i class="bi bi-eye" id="btn-senha" onclick="mostrarSenha()"></i>
                </div>

                <div class="caixa-senha">
                    <input type="password" placeholder="Confirme sua senha" id="confirme-senha" required>
                    <i class="bi bi-eye" id="btn-conf-senha" onclick="mostrarSenhaConfirma()"></i>
                </div>
            </div>
            <input type="submit" value="Criar conta">
        </form>
        <a href="login.html">Já tem uma conta? Entrar</a>
    </div>
    <script src="login-script.js"></script>
</body>
</html>
