{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar senha</title>
    <link rel="stylesheet" href="{% static 'css/base.css'%}">
    <link rel="stylesheet" href="{% static 'css/login-style.css' %}">
</head>
<body>
    <div class="caixa-login">
        <img src="{% static 'images/logo.png' %}" alt="logo">

        <div class="texto">
            <h1>Recuperar senha</h1>
            <p>Informe o email cadastrado para receber o link de redefinicao.</p>
        </div>

        <form method="post" class="form-login">
            {% csrf_token %}

            {% if form.errors %}
                <div class="erro-form">
                    {{ form.email.errors }}
                </div>
            {% endif %}

            <div class="campo-outline">
                <label for="{{ form.email.id_for_label }}">Email</label>
                <input type="email"
                    name="email"
                    id="{{ form.email.id_for_label }}"
                    placeholder=" "
                    required
                    autocomplete="email">
            </div>

            <button type="submit" class="btn-submit" data-loading-text="Enviando...">Enviar link</button>
        </form>

        <hr>
        <a href="{% url 'accounts:login' %}">Voltar para o login</a>
    </div>
    <script src="{% static 'js/form-feedback.js' %}"></script>
</body>
</html>
