{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova senha</title>
    <link rel="stylesheet" href="{% static 'css/base.css'%}">
    <link rel="stylesheet" href="{% static 'css/login-style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="caixa-login">
        <img src="{% static 'images/logo.png' %}" alt="logo">

        <div class="texto">
            <h1>Nova senha</h1>
            <p>Crie uma senha nova para acessar sua conta.</p>
        </div>

        {% if validlink %}
            <form method="post" class="form-login">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="erro-form">
                        {{ form.errors }}
                    </div>
                {% endif %}

                <div class="campo-outline campo-senha">
                    <label for="{{ form.new_password1.id_for_label }}">Nova senha</label>
                    <input type="password"
                        name="new_password1"
                        id="{{ form.new_password1.id_for_label }}"
                        placeholder=" "
                        required
                        autocomplete="new-password">
                </div>

                <div class="campo-outline campo-senha">
                    <label for="{{ form.new_password2.id_for_label }}">Confirmar senha</label>
                    <input type="password"
                        name="new_password2"
                        id="{{ form.new_password2.id_for_label }}"
                        placeholder=" "
                        required
                        autocomplete="new-password">
                </div>

                <input type="submit" value="Salvar senha">
            </form>
        {% else %}
            <p class="texto-apoio">Este link e invalido ou ja foi usado. Solicite uma nova recuperacao de senha.</p>
        {% endif %}

        <hr>
        <a href="{% url 'accounts:password_reset' %}">Solicitar novo link</a>
    </div>
</body>
</html>
