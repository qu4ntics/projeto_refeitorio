{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email enviado</title>
    <link rel="stylesheet" href="{% static 'css/base.css'%}">
    <link rel="stylesheet" href="{% static 'css/login-style.css' %}">
</head>
<body>
    <div class="caixa-login">
        <img src="{% static 'images/logo.png' %}" alt="logo">

        <div class="texto">
            <h1>Confira seu email</h1>
            <p>Se o endereco estiver cadastrado, enviamos um link para redefinir sua senha.</p>
        </div>

        <p class="texto-apoio">Por seguranca, a mensagem nao confirma se o email existe no sistema.</p>

        <hr>
        <a href="{% url 'accounts:login' %}">Voltar para o login</a>
    </div>
</body>
</html>
