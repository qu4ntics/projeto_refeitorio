<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Almoço</title>
    <link rel="stylesheet" href="reservas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="topo">
        <div class="logo-topo">
            <div class="logo-area">
                <img src="logo.png" alt="Logo">
                <div class="titulo-logo">
                    <h1>Refeitório</h1>
                    <span>NUTRICIONISTA</span>
                </div>
            </div>
        </div>
        <div class="topo-direita">
            <p>Quarta-feira, 20 de Maio</p>
            <button><i class="fa-regular fa-bell"></i></button>
            <button><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
    </header>

    <main class="container-reservas">
        <div class="topo-reservas">
            <div class="titulo-pagina">
                <a href="nutricionista.html" class="seta-voltar" title="Voltar para o Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="texto-titulo">
                    <h2>Reservas</h2>
                    <p>[Dia], [Data do mes]</p>
                </div>
            </div>
            
            <div class="cards-contagem">
                <div class="card-total">
                    <span class="label-card">Total reservado</span>
                    <span class="valor-card">0/ 180</span>
                </div>
                <div class="card-total">
                    <span class="label-card">Total reservado</span>
                    <span class="valor-card total-unico">0</span>
                </div>
            </div>
        </div>

        <div class="tabela-container">
            <div class="barra-filtros">
                <div class="input-falso"></div>
            </div>

            <table class="tabela-reservas">
                <thead>
                    <tr>
                        <th>Aluno</th>
                        <th>Turma</th>
                        <th>Reservado em</th>
                    </tr>
                </thead>
                <!--Para arrumar em breve-->
                <tbody>
                    <tr>
                        <td>João da Silva</td>
                        <td>2° Informática</td>
                        <td>19/05 às 16h22</td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </main>
</body>
</html>
