<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nutricionista</title>
    <link rel="stylesheet" href="nova-refeicao-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- MENU DA PARTE DE CIMA -->
    <header class="topo">
        <div class="logo-topo">
            <div class="logo-area">
                <img src="../accounts/assets/logo.png" alt="Logo">
                <div class="titulo-logo">
                    <h1>Refeitório</h1>
                    <span>NUTRICIONISTA</span>
                </div>
            </div>
        </div>
        <div class="topo-direita">
            <p>[Dia da Semana], [Data do mês]</p>
            <button><i class="fa-regular fa-bell"></i></button>
            <button><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
    </header>
    <div class="container-dashboard">
        <div class="caixa-receita">
            <div class="voltar">
                <a href=" ">&larr;</a>
                <p>Nova refeição</p>
            </div>

            <div class="forumlario">
                <form>
                    <div class="form-linha">
                        <div class="form-grupo tamanho-data">
                            <label for="data">Data</label>
                            <input type="date" name="data" id="data" required>
                        </div>
                        
                        <div class="form-grupo expandir">
                            <label for="tipo">Tipo de refeição</label>
                            <select name="tipo" id="tipo" required>
                                <option value="1">Café da manhã</option>
                                <option value="2">Lanche da manhã</option>
                                <option value="3">Almoço</option>
                                <option value="4">Lanche da tarde</option>
                                <option value="5">Jantar</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-grupo">
                        <label for="desc">Descrição do prato</label>
                        <textarea name="descricao" id="desc" rows="4"></textarea>
                    </div>
                    
                    <div class="form-linha alinhamento-meio">
                        <div class="toggle-exigencia">
                            <div class="toggle-container">
                                <div class="toggle-texto">
                                    <span class="toggle-titulo">Exige reserva</span>
                                    <p class="toggle-subtitulo">Se desativado, a refeição é apenas informativa</p>
                                </div>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="exigirReserva" class="toggle-checkbox" checked>
                                    <label for="exigirReserva" class="toggle-label"></label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-grupo-horizontal">
                            <label for="limite">Limite de reservas:</label>
                            <input type="number" id="limite" value="180" required>
                        </div>
                    </div>
                    
                    <div class="tempo-reserva">
                        <span class="tempo-titulo">Janela de reserva desta refeição</span>
                        <p class="tempo-subtitulo">Abertura: <strong>{}/strong> do dia anterior - Encerramento: <strong>{}</strong> do dia</p>
                        <a href="#">Alterar nas configurações</a>
                    </div>
                    
                    <div class="botoes-acoes">
                        <button type="button" class="btn-cancelar">CANCELAR</button>
                        <input type="submit" value="SALVAR" class="btn-salvar">
                    </div>
            </form>
            </div>
        </div>
        </main>
    </div>
</body>
</html>
